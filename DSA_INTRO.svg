<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100.8961008300776 735.9999694824219" width="1100.8961008300776" height="735.9999694824219"><!-- svg-source:excalidraw --><metadata></metadata><defs><style class="style-fonts">
      @font-face { font-family: Nunito; src: url(data:font/woff2;base64,); }</style></defs><rect x="0" y="0" width="1100.8961008300776" height="735.9999694824219" fill="#121212"></rect><g transform="translate(10 10) rotate(0 491.4850164020153 40)"><text x="0" y="15.264000000000001" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Data Structures And Algorithms</text><text x="0" y="35.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text><text x="0" y="55.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">This subject  helps us to understand how to store ,organize and processs the data so that the programs/aplications becoem more</text><text x="0" y="75.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">efficient &amp; will work with minimum resources(memory).</text></g><g transform="translate(10.799972534179688 103.80001831054688) rotate(0 292.40000915527344 80)"><text x="0" y="15.264000000000001" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Data structure are categorised into 2 different types</text><text x="0" y="35.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">1.Linear 2. non linear</text><text x="0" y="55.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text><text x="0" y="75.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">In Linear data structure ,there is 1-1 relationship between its elements. For eg</text><text x="0" y="95.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Arrays,linked list ,stack, queue ,etc.</text><text x="0" y="115.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text><text x="0" y="135.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">In Non linear data structures , there is 1-many relationship between its element</text><text x="0" y="155.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">eg tree,Graphs ,Hash tables etc</text></g><g transform="translate(16.399932861328125 309.99998474121094) rotate(0 414.4000244140625 10)"><text x="0" y="15.264000000000001" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text></g><g transform="translate(13.199951171875 405.9999694824219) rotate(0 418.3999938964844 160)"><text x="0" y="15.264000000000001" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Algorithms are categorised into different types </text><text x="0" y="35.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">1.Brute Force Algorithm</text><text x="0" y="55.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">2.Divide &amp; Conquer Algorithm</text><text x="0" y="75.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">3.Greedy Algorithm</text><text x="0" y="95.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">4.Dynamic Programmming </text><text x="0" y="115.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">5.Backtracking </text><text x="0" y="135.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">6.Hashing</text><text x="0" y="155.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">7.Recursion</text><text x="0" y="175.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text><text x="0" y="195.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text><text x="0" y="215.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Other two factors affecting time complexity </text><text x="0" y="235.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">1.Type of input 2. Amount of input</text><text x="0" y="255.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text><text x="0" y="275.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">In type of input , generally, we should consider a. Best Case b. Average Case c. Worst Case</text><text x="0" y="295.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text><text x="0" y="315.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text></g><g transform="translate(11.5999755859375 280.3999938964844) rotate(0 539.64806262207 40)"><text x="0" y="15.264000000000001" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Algorithm - An algorithm, is problem solving technique Or it is a finite set of instruction which if followed can accompalish/perform the given task.</text><text x="0" y="35.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text><text x="0" y="55.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">The performance of an algorithm is basicly based on two factors </text><text x="0" y="75.264" font-family="Nunito, sans-serif, Segoe UI Emoji" font-size="16px" fill="#d3d3d3" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">1.time complaxity  2. space complixity </text></g></svg>